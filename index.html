<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaam</title>
<meta name="description" content="Kaam — punch tasks in fast, stamp them done.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14171F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kaam">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171F; --surface:#1C2029; --surface-2:#242938; --surface-3:#2C3244;
    --ink:#F0EDE6; --ink-dim:#9AA0AE; --ink-faint:#5B6272;
    --accent:#F5A623; --accent-ink:#14171F; --teal:#2DD4BF; --rose:#E8615C;
    --border:rgba(240,237,230,0.09); --shadow:0 8px 24px rgba(0,0,0,0.35); --radius:14px;
  }
  [data-theme="light"]{
    --bg:#FAF7F0; --surface:#FFFFFF; --surface-2:#F2ECDE; --surface-3:#E9E1CE;
    --ink:#1C2029; --ink-dim:#6B7280; --ink-faint:#9CA3AF;
    --accent:#C9790C; --accent-ink:#FFFFFF; --teal:#0F8C7E; --rose:#C7433D;
    --border:rgba(28,32,41,0.09); --shadow:0 8px 24px rgba(28,32,41,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s ease,color .25s ease;min-height:100vh;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Fraunces',serif;}
  #app{max-width:960px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

  header.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px 20px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-family:'Fraunces',serif;font-weight:700;font-size:26px;margin:0;letter-spacing:-0.5px;}
  .brand .tagline{font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}
  .icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;flex-shrink:0;}
  .icon-btn:hover{color:var(--ink);border-color:var(--ink-faint);}
  .icon-btn.on{color:var(--accent);border-color:var(--accent);}
  .header-actions{display:flex;gap:8px;}

  nav.tabs{display:flex;gap:6px;padding:4px 20px 14px 20px;overflow-x:auto;}
  .tab{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--ink-dim);cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:.15s;}
  .tab:hover{color:var(--ink);}
  .tab.active{background:var(--accent);color:var(--accent-ink);}

  .quickadd-wrap{padding:0 20px 14px 20px;position:sticky;top:0;z-index:20;background:var(--bg);}
  .quickadd{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);}
  .quickadd.focused{border-color:var(--accent);}
  .quickadd input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:15px;font-family:'Inter',sans-serif;min-width:0;}
  .quickadd input::placeholder{color:var(--ink-faint);}
  .quickadd .stamp-plus{width:34px;height:34px;border-radius:10px;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:transform .12s ease;}
  .quickadd .stamp-plus:active{transform:scale(0.9);}

  .details-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:8px;}
  .field-group{margin-bottom:14px;}
  .field-group:last-child{margin-bottom:0;}
  .field-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;margin-bottom:7px;}
  .field-select{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--ink);padding:9px 10px;border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;}
  .new-cat-input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--ink);padding:9px 10px;border-radius:9px;font-size:13px;margin-top:7px;}
  .segmented{display:flex;gap:6px;}
  .segmented button{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink-dim);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
  .segmented button.active.low{background:var(--teal);color:#04231f;border-color:var(--teal);}
  .segmented button.active.med{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
  .segmented button.active.high{background:var(--rose);color:#fff;border-color:var(--rose);}
  .due-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .due-row button{padding:8px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink-dim);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
  .due-row button.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
  .due-row input[type=date]{background:var(--surface-2);border:1px solid var(--border);color:var(--ink);padding:7px 8px;border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;}
  .tag-input-row{display:flex;gap:6px;margin-bottom:8px;}
  .tag-input-row input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--ink);padding:9px 10px;border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;}
  .tag-chips{display:flex;gap:6px;flex-wrap:wrap;}
  .tag-chip{display:flex;align-items:center;gap:5px;background:var(--surface-3);color:var(--ink-dim);padding:4px 9px;border-radius:999px;font-size:11.5px;font-family:'IBM Plex Mono',monospace;}
  .tag-chip button{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:0;font-size:14px;line-height:1;}
  .overlook-bar{margin-top:8px;padding:10px 14px;background:var(--surface-2);border-radius:12px;font-size:12.5px;color:var(--ink-dim);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .overlook-bar b{color:var(--ink);font-weight:600;}
  .details-toggle-row{display:flex;justify-content:flex-end;margin-top:6px;padding-right:2px;}
  .details-link{font-size:12px;color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;}
  .details-link:hover{color:var(--accent);}

  main{flex:1;padding:0 20px 100px 20px;}

  .filterbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .filterbar select,.filterbar input[type=text]{background:var(--surface);border:1px solid var(--border);color:var(--ink);padding:7px 10px;border-radius:9px;font-size:12.5px;font-family:'Inter',sans-serif;outline:none;}
  .filterbar input[type=text]{width:150px;}
  .chip-toggle{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:12.5px;cursor:pointer;color:var(--ink-dim);user-select:none;}
  .chip-toggle.active{background:var(--rose);color:#fff;border-color:var(--rose);}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;margin:22px 0 10px 4px;}
  .section-label:first-child{margin-top:0;}
  .task-row{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden;}
  .task-row.done{opacity:.55;}
  .task-row .stripe{position:absolute;left:0;top:0;bottom:0;width:4px;}
  .checkbox{width:22px;height:22px;border-radius:50%;border:2px solid var(--ink-faint);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:.15s;position:relative;}
  .checkbox.checked{background:var(--accent);border-color:var(--accent);}
  .checkbox svg{width:12px;height:12px;stroke:var(--accent-ink);}
  .task-main{flex:1;min-width:0;}
  .task-title{font-size:14.5px;font-weight:500;line-height:1.4;word-break:break-word;}
  .task-row.done .task-title{text-decoration:line-through;color:var(--ink-dim);}
  .task-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .pill{font-size:10.5px;padding:3px 8px;border-radius:999px;font-family:'IBM Plex Mono',monospace;display:inline-flex;align-items:center;gap:4px;}
  .pill.tag{background:var(--surface-3);color:var(--ink-dim);}
  .pill.cat{background:rgba(45,212,191,0.15);color:var(--teal);}
  .pill.due{background:var(--surface-3);color:var(--ink-dim);}
  .pill.due.overdue{background:rgba(232,97,92,0.18);color:var(--rose);}
  .pill.due.today{background:rgba(245,166,35,0.18);color:var(--accent);}
  .pill.recur{color:var(--ink-faint);}
  .task-actions{display:flex;gap:4px;flex-shrink:0;}
  .task-actions button{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:4px;border-radius:6px;}
  .task-actions button:hover{color:var(--rose);background:var(--surface-3);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint);}
  .empty-state .stamp-ring{width:64px;height:64px;border:3px dashed var(--ink-faint);border-radius:50%;margin:0 auto 14px auto;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;color:var(--ink-faint);}
  .empty-state p{font-size:13.5px;max-width:280px;margin:0 auto;}

  .board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  @media(max-width:720px){.board{grid-template-columns:1fr;}}
  .board-col{background:var(--surface-2);border-radius:14px;padding:12px;min-height:120px;}
  .board-col h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-family:'IBM Plex Mono',monospace;color:var(--ink-dim);margin:2px 0 12px 4px;display:flex;justify-content:space-between;}
  .board-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:8px;}
  .board-card .task-title{font-size:13.5px;}
  .board-card .task-meta{margin-top:8px;}
  .board-move{display:flex;gap:5px;margin-top:9px;}
  .board-move button{flex:1;font-size:10.5px;font-family:'IBM Plex Mono',monospace;background:var(--surface-3);border:none;color:var(--ink-dim);padding:5px 4px;border-radius:6px;cursor:pointer;}
  .board-move button:hover{color:var(--ink);}
  .board-move button.primary{background:var(--accent);color:var(--accent-ink);}

  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-header h2{font-family:'Fraunces',serif;font-size:19px;margin:0;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{font-size:10px;text-align:center;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;padding-bottom:4px;}
  .cal-day{aspect-ratio:1;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 2px;cursor:pointer;font-size:12px;position:relative;}
  .cal-day.empty{background:none;border:none;cursor:default;}
  .cal-day.today{border-color:var(--accent);}
  .cal-day.selected{background:var(--accent);color:var(--accent-ink);}
  .cal-dots{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap;justify-content:center;}
  .cal-dot{width:5px;height:5px;border-radius:50%;}
  .cal-daylist{margin-top:18px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
  @media(max-width:720px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .stat-card .num{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1;}
  .stat-card .lbl{font-size:11px;color:var(--ink-dim);margin-top:6px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
  .stat-card.accent .num{color:var(--accent);}
  .stat-card.rose .num{color:var(--rose);}
  .stat-card.teal .num{color:var(--teal);}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
  .panel h3{font-family:'Fraunces',serif;font-size:16px;margin:0 0 14px 0;}

  .bar-chart{display:flex;align-items:flex-end;gap:10px;height:110px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
  .bar{width:100%;max-width:26px;background:var(--surface-3);border-radius:5px 5px 0 0;position:relative;min-height:3px;}
  .bar .fill{position:absolute;bottom:0;left:0;right:0;background:var(--accent);border-radius:5px 5px 0 0;transition:height .4s ease;}
  .bar-lbl{font-size:10px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;}

  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;}
  .legend-item{display:flex;align-items:center;gap:7px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .ledger{display:flex;gap:5px;flex-wrap:wrap;}
  .ledger-cell{width:16px;height:16px;border-radius:4px;background:var(--surface-3);}
  .ledger-cell.filled{background:var(--accent);}

  .recent-list{display:flex;flex-direction:column;gap:8px;}
  .recent-item{display:flex;align-items:center;gap:10px;font-size:13px;}
  .recent-item .stamp-mini{width:20px;height:20px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .recent-item .when{color:var(--ink-faint);font-size:11px;font-family:'IBM Plex Mono',monospace;margin-left:auto;}

  @keyframes stampdown{0%{transform:scale(2.2) rotate(-16deg);opacity:0;}55%{transform:scale(0.92) rotate(-4deg);opacity:1;}75%{transform:scale(1.06) rotate(-6deg);}100%{transform:scale(1) rotate(-8deg);opacity:0;}}
  .stamp-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:200;}
  .stamp-overlay .ring{width:110px;height:110px;border-radius:50%;border:4px solid var(--rose);display:flex;align-items:center;justify-content:center;color:var(--rose);font-family:'Fraunces',serif;font-weight:700;font-size:20px;letter-spacing:1px;animation:stampdown .55s ease-out forwards;background:radial-gradient(circle, rgba(232,97,92,0.06), transparent 70%);}

  .lock-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
  .lock-title{font-family:'Fraunces',serif;font-size:24px;}
  .lock-sub{font-size:12.5px;color:var(--ink-dim);text-align:center;max-width:240px;font-family:'IBM Plex Mono',monospace;}
  .pin-dots{display:flex;gap:14px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--ink-faint);}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent);}
  .pin-dot.error{border-color:var(--rose);}
  .keypad{display:grid;grid-template-columns:repeat(3,64px);gap:14px;}
  .key{width:64px;height:64px;border-radius:50%;background:var(--surface);border:1px solid var(--border);font-size:20px;color:var(--ink);cursor:pointer;font-family:'IBM Plex Mono',monospace;}
  .key:active{background:var(--surface-3);}
  .key.ghost{background:none;border:none;color:var(--ink-faint);font-size:13px;}
  .lock-links{display:flex;gap:18px;font-size:12px;color:var(--ink-faint);}
  .lock-links span{cursor:pointer;text-decoration:underline;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px;}

  .fade-in{animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;z-index:150;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;animation:toastin .25s ease,toastout .3s ease 1.7s forwards;}
  @keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  @keyframes toastout{to{opacity:0;transform:translateX(-50%) translateY(10px);}}

  .storage-banner{background:rgba(232,97,92,0.15);border:1px solid var(--rose);color:var(--rose);font-size:12px;padding:9px 14px;border-radius:10px;margin:0 20px 12px 20px;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   STORAGE ADAPTER
   Tries Claude.ai's window.storage first (works in-chat preview).
   Always also writes to localStorage, and reads from it as a
   fallback — this is what actually persists once the app is
   deployed/installed as a standalone PWA in a real browser.
   ============================================================ */
const KaamStorage = {
  hasClaudeStorage(){
    return typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function';
  },
  async get(key){
    if(this.hasClaudeStorage()){
      try{
        const r = await window.storage.get(key, false);
        if(r && typeof r.value === 'string') return r.value;
      }catch(e){ /* key missing or unavailable in this context */ }
    }
    try{ return window.localStorage.getItem(key); }catch(e){ return null; }
  },
  async set(key, value){
    let remoteOk = false;
    if(this.hasClaudeStorage()){
      try{ await window.storage.set(key, value, false); remoteOk = true; }catch(e){ /* ignore, fall back below */ }
    }
    try{ window.localStorage.setItem(key, value); }catch(e){
      if(!remoteOk){ console.error('Kaam: could not persist data anywhere', e); return false; }
    }
    return true;
  }
};

/* ============================= STATE ============================= */
const state = {
  pin: null,
  darkMode: true,
  tasks: [],
  view: 'dashboard',
  filters: { search:'', category:'all', tag:'all', priority:'all', status:'all', overdueOnly:false },
  calendarMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1),
  selectedDay: null,
  locked: false,
  pinFlow: null,
  pinDraft: '',
  pinTemp: '',
  pinError: false,
  loaded: false,
  storageWarning: false,
  detailsOpen: false,
  draft: { title:'', category:'', newCategory:false, priority:'med', due:null, dueChip:null, recurrence:'none', tags:[] },
};

const STORAGE_KEY = 'kaam:app';

function uid(){ return 'k' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return ''; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function daysDiff(iso){ const d = new Date(iso+'T00:00:00'); const t = new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================= PERSISTENCE ============================= */
async function loadState(){
  try{
    const raw = await KaamStorage.get(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.pin = parsed.pin || null;
      state.darkMode = parsed.darkMode !== undefined ? parsed.darkMode : true;
      state.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
    }
  }catch(e){ console.error('Kaam: load failed', e); }
  state.locked = !!state.pin;
  state.pinFlow = state.pin ? 'enter' : null;
  state.loaded = true;
  render();
}

let saveTimer = null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const ok = await KaamStorage.set(STORAGE_KEY, JSON.stringify({ pin: state.pin, darkMode: state.darkMode, tasks: state.tasks }));
    if(!ok && !state.storageWarning){ state.storageWarning = true; render(); }
  }, 200);
}

/* ============================= DUE DATE HELPERS ============================= */
function computeDueChip(chip){
  const d = new Date();
  if(chip==='today') return d.toISOString().slice(0,10);
  if(chip==='tomorrow'){ d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
  if(chip==='nextweek'){ d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); }
  return null;
}
function nextDueDate(iso, recurrence){
  const d = iso ? new Date(iso+'T00:00:00') : new Date();
  if(recurrence==='daily') d.setDate(d.getDate()+1);
  else if(recurrence==='weekly') d.setDate(d.getDate()+7);
  else if(recurrence==='monthly') d.setMonth(d.getMonth()+1);
  return d.toISOString().slice(0,10);
}

/* ============================= TASK OPS ============================= */
function resetDraftAfterAdd(){
  state.draft.title = '';
  state.draft.category = '';
  state.draft.newCategory = false;
  state.draft.priority = 'med';
  state.draft.due = null;
  state.draft.dueChip = null;
  state.draft.tags = [];
  state.draft.recurrence = 'none';
  // Every field resets to a visible, predictable default after each add — nothing carries over
  // silently, so you always know exactly what you're about to log next.
}

function submitDraft(){
  const title = state.draft.title.trim();
  if(!title) return false;
  const task = {
    id: uid(),
    title,
    category: state.draft.category ? state.draft.category.trim().toLowerCase() : null,
    tags: [...state.draft.tags],
    priority: state.draft.priority,
    due: state.draft.due,
    status: 'todo',
    recurrence: state.draft.recurrence,
    createdAt: new Date().toISOString(),
    completedAt: null,
  };
  state.tasks.unshift(task);
  persist();
  resetDraftAfterAdd();
  return task;
}

function toggleDone(id){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  if(task.status!=='done'){
    task.status='done';
    task.completedAt = new Date().toISOString();
    playStamp();
    if(task.recurrence && task.recurrence!=='none'){
      state.tasks.unshift({
        id: uid(), title: task.title, category: task.category, tags: [...task.tags],
        priority: task.priority, due: nextDueDate(task.due, task.recurrence),
        status:'todo', recurrence: task.recurrence, createdAt: new Date().toISOString(), completedAt:null
      });
    }
  } else {
    task.status='todo'; task.completedAt=null;
  }
  persist(); render();
}

function setStatus(id, status){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  if(status==='done' && task.status!=='done'){ toggleDone(id); return; }
  task.status = status;
  if(status!=='done') task.completedAt=null;
  persist(); render();
}

function deleteTask(id){
  state.tasks = state.tasks.filter(t=>t.id!==id);
  persist(); render();
}

function playStamp(){
  const el = document.createElement('div');
  el.className='stamp-overlay';
  el.innerHTML = '<div class="ring">KAAM<br/>HO GAYA</div>';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 600);
}

function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `${checkIcon()} ${escapeHTML(msg)}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2000);
}

/* ============================= STREAK / STATS ============================= */
function computeStreak(){
  const doneDates = new Set(state.tasks.filter(t=>t.completedAt).map(t=>t.completedAt.slice(0,10)));
  let streak = 0;
  let d = new Date();
  if(!doneDates.has(d.toISOString().slice(0,10))){ d.setDate(d.getDate()-1); }
  while(doneDates.has(d.toISOString().slice(0,10))){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}
function last7DaysCounts(){
  const counts = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    const c = state.tasks.filter(t=>t.completedAt && t.completedAt.slice(0,10)===iso).length;
    counts.push({label: d.toLocaleDateString(undefined,{weekday:'narrow'}), count:c, iso});
  }
  return counts;
}
function categoryBreakdown(){
  const open = state.tasks.filter(t=>t.status!=='done');
  const map = {};
  open.forEach(t=>{ const c = t.category || 'uncategorized'; map[c]=(map[c]||0)+1; });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

/* ============================= HELPERS ============================= */
function allCategories(){ return [...new Set(state.tasks.map(t=>t.category).filter(Boolean))].sort(); }
function isOverdue(t){ return t.due && t.status!=='done' && daysDiff(t.due) < 0; }

function filteredTasks(){
  return state.tasks.filter(t=>{
    const f = state.filters;
    if(f.search && !t.title.toLowerCase().includes(f.search.toLowerCase())) return false;
    if(f.category!=='all' && (t.category||'uncategorized')!==f.category) return false;
    if(f.tag!=='all' && !(t.tags||[]).includes(f.tag)) return false;
    if(f.priority!=='all' && t.priority!==f.priority) return false;
    if(f.status!=='all' && t.status!==f.status) return false;
    if(f.overdueOnly && !isOverdue(t)) return false;
    return true;
  });
}

const PRIORITY_COLOR = { high:'var(--rose)', med:'var(--accent)', low:'var(--teal)' };
const CAT_PALETTE = ['#2DD4BF','#F5A623','#E8615C','#8B7FE8','#5FB0F0','#E894C4','#9CCB6E'];
const PRIORITY_LABEL = { high:'High priority', med:'Medium priority', low:'Low priority' };
const RECUR_LABEL = { none:'', daily:'Repeats daily', weekly:'Repeats weekly', monthly:'Repeats monthly' };

function dueLabel(t){
  if(!t.due) return null;
  const diff = daysDiff(t.due);
  let cls='due', text='';
  if(diff<0){ cls+=' overdue'; text = Math.abs(diff)===1?'1d overdue':`${Math.abs(diff)}d overdue`; }
  else if(diff===0){ cls+=' today'; text='Today'; }
  else if(diff===1){ text='Tomorrow'; }
  else { text=`in ${diff}d`; }
  return {cls, text};
}

/* ============================= RENDER: ROOT ============================= */
function render(){
  const root = document.getElementById('app');
  document.body.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  if(!state.loaded){ root.innerHTML = ''; return; }
  if(state.locked || state.pinFlow==='setup1' || state.pinFlow==='setup2'){
    root.innerHTML = renderLock();
    attachLockEvents();
    return;
  }
  root.innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    ${state.storageWarning ? `<div class="storage-banner">Heads up: this browser is blocking storage, so tasks may not survive a refresh. Try a normal (non-private) browser tab.</div>` : ''}
    ${renderQuickAdd()}
    <main>${renderView()}</main>
  `;
  attachGlobalEvents();
}

    else dueTxt = `in ${diff}d (${fmtDate(d.due)})`;

/* ============================= LOCK SCREEN ============================= */
function renderLock(){
  const flow = state.pinFlow;
  let title, sub;
  if(flow==='setup1'){ title='Set a PIN'; sub='Choose a 4-digit PIN to keep your kaam private.'; }
  else if(flow==='setup2'){ title='Confirm your PIN'; sub='Enter it once more to lock it in.'; }
  else { title='Kaam is locked'; sub='Enter your PIN to get back to work.'; }
  const len = state.pinDraft.length;
  return `
  <div class="lock-screen">
    <div class="empty-state" style="padding:0;"><div class="stamp-ring">局</div></div>
    <div class="lock-title">${title}</div>
    <div class="lock-sub">${sub}</div>
    <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot ${i<len?'filled':''} ${state.pinError?'error':''}"></div>`).join('')}</div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-key="${n}">${n}</button>`).join('')}
      <button class="key ghost" data-key="clear">clear</button>
      <button class="key" data-key="0">0</button>
      <button class="key ghost" data-key="back">⌫</button>
    </div>
    <div class="lock-links">
      ${flow==='enter' ? `<span id="forgot-pin">Forgot PIN</span>` : ''}
      ${flow==='setup1' ? `<span id="skip-pin">Skip for now</span>` : ''}
    </div>
  </div>`;
}

function attachLockEvents(){
  document.querySelectorAll('.key').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const k = btn.dataset.key;
      state.pinError = false;
      if(k==='clear'){ state.pinDraft=''; }
      else if(k==='back'){ state.pinDraft = state.pinDraft.slice(0,-1); }
      else if(state.pinDraft.length<4){ state.pinDraft += k; }
      if(state.pinDraft.length===4){ handlePinComplete(); } else { render(); }
    });
  });
  const forgot = document.getElementById('forgot-pin');
  if(forgot) forgot.addEventListener('click', ()=>{
    if(confirm('Reset your PIN? Your tasks will stay safe — only the lock is removed.')){
      state.pin = null; state.locked=false; state.pinFlow=null; state.pinDraft='';
      persist(); render();
    }
  });
  const skip = document.getElementById('skip-pin');
  if(skip) skip.addEventListener('click', ()=>{ state.pinFlow=null; state.locked=false; state.pinDraft=''; render(); });
}

function handlePinComplete(){
  if(state.pinFlow==='enter'){
    if(state.pinDraft===state.pin){ state.locked=false; state.pinFlow=null; state.pinDraft=''; render(); }
    else { state.pinError=true; render(); setTimeout(()=>{ state.pinDraft=''; state.pinError=false; render(); }, 450); }
    return;
  }
  if(state.pinFlow==='setup1'){ state.pinTemp = state.pinDraft; state.pinDraft=''; state.pinFlow='setup2'; render(); return; }
  if(state.pinFlow==='setup2'){
    if(state.pinDraft===state.pinTemp){ state.pin = state.pinDraft; state.pinFlow=null; state.locked=false; state.pinDraft=''; persist(); render(); }
    else { state.pinError=true; render(); setTimeout(()=>{ state.pinDraft=''; state.pinFlow='setup1'; state.pinError=false; render(); }, 500); }
  }
}

/* ============================= DASHBOARD ============================= */
function renderDashboard(){
  const completedToday = state.tasks.filter(t=>t.completedAt && t.completedAt.slice(0,10)===todayISO()).length;
  const streak = computeStreak();
  const overdue = state.tasks.filter(isOverdue).length;
  const upcoming = state.tasks.filter(t=>t.due && t.status!=='done' && daysDiff(t.due)>=0 && daysDiff(t.due)<=7).length;
  const week = last7DaysCounts();
  const maxCount = Math.max(1, ...week.map(w=>w.count));
  const cats = categoryBreakdown().slice(0,6);
  const totalOpen = cats.reduce((s,c)=>s+c[1],0) || 1;
  const recent = [...state.tasks].filter(t=>t.completedAt).sort((a,b)=>b.completedAt.localeCompare(a.completedAt)).slice(0,5);
  const last14 = [];
  for(let i=13;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const iso=d.toISOString().slice(0,10);
    last14.push(state.tasks.some(t=>t.completedAt && t.completedAt.slice(0,10)===iso)); }

  return `
  <div class="fade-in">
    <div class="stat-grid">
      <div class="stat-card accent"><div class="num mono">${completedToday}</div><div class="lbl">Stamped today</div></div>
      <div class="stat-card"><div class="num mono">${streak}🔥</div><div class="lbl">Day streak</div></div>
      <div class="stat-card rose"><div class="num mono">${overdue}</div><div class="lbl">Overdue</div></div>
      <div class="stat-card teal"><div class="num mono">${upcoming}</div><div class="lbl">Due in 7 days</div></div>
    </div>
    <div class="panel"><h3>This week's stamps</h3>
      <div class="bar-chart">${week.map(w=>`<div class="bar-col"><div class="bar" style="height:100%;"><div class="fill" style="height:${(w.count/maxCount*100) || 2}%;"></div></div><div class="bar-lbl">${w.label}</div></div>`).join('')}</div>
    </div>
    <div class="panel"><h3>14-day ledger</h3><div class="ledger">${last14.map(f=>`<div class="ledger-cell ${f?'filled':''}"></div>`).join('')}</div></div>
    <div class="panel"><h3>Open work by category</h3>
      ${cats.length ? `<div class="donut-wrap">${donutSVG(cats, totalOpen)}<div class="legend">${cats.map((c,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${CAT_PALETTE[i%CAT_PALETTE.length]}"></div>${c[0]} <span class="mono" style="color:var(--ink-faint)">${c[1]}</span></div>`).join('')}</div></div>`
      : `<div class="empty-state" style="padding:20px;"><p>Nothing open yet. Add a task to see it here.</p></div>`}
    </div>
    <div class="panel"><h3>Recently stamped</h3>
      ${recent.length ? `<div class="recent-list">${recent.map(t=>`<div class="recent-item">${checkIcon('mini')} ${escapeHTML(t.title)} <span class="when mono">${fmtDate(t.completedAt.slice(0,10))}</span></div>`).join('')}</div>`
      : `<p style="color:var(--ink-faint);font-size:13px;">Nothing stamped yet — punch in your first task above.</p>`}
    </div>
  </div>`;
}

function donutSVG(cats, total){
  const r = 46, cx=55, cy=55, circ = 2*Math.PI*r;
  let offset = 0;
  const segs = cats.map((c,i)=>{
    const frac = c[1]/total; const len = frac*circ;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${CAT_PALETTE[i%CAT_PALETTE.length]}" stroke-width="14" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += len; return seg;
  }).join('');
  return `<svg width="110" height="110" viewBox="0 0 110 110">${segs}<circle cx="${cx}" cy="${cy}" r="30" fill="var(--surface)"/></svg>`;
}

function boardCardHTML(t, status){
  const due = dueLabel(t);
  return `
  <div class="board-card" data-id="${t.id}">
    <div class="task-title">${escapeHTML(t.title)}</div>
    <div class="task-meta">
      <span class="pill cat">@${t.category || 'uncategorized'}</span>
      ${(t.tags||[]).map(tag=>`<span class="pill tag">#${escapeHTML(tag)}</span>`).join('')}
      ${due?`<span class="pill ${due.cls}">${due.text}</span>`:''}
    </div>
    <div class="board-move">
      ${status!=='todo'?`<button data-move="todo">← To do</button>`:''}
      ${status!=='doing'?`<button data-move="doing" class="${status==='todo'?'primary':''}">${status==='todo'?'Start →':'← Doing'}</button>`:''}
      ${status!=='done'?`<button data-move="done" class="${status==='doing'?'primary':''}">Done ✓</button>`:''}
    </div>
  </div>`;
}

/* ============================= CALENDAR VIEW ============================= */
function renderCalendar(){
  const month = state.calendarMonth;
  const y = month.getFullYear(), m = month.getMonth();
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const todayIso = todayISO();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const tasksByDay = {};
  state.tasks.forEach(t=>{ if(t.due){ (tasksByDay[t.due] = tasksByDay[t.due]||[]).push(t); } });

  const selDay = state.selectedDay;
  const selTasks = selDay ? (tasksByDay[selDay]||[]) : [];

  return `
  <div class="fade-in">
    <div class="cal-header">
      <button class="icon-btn" id="cal-prev">${chevLeft()}</button>
      <h2>${month.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2>
      <button class="icon-btn" id="cal-next">${chevRight()}</button>
    </div>
    <div class="cal-grid">
      ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(d=>{
        if(!d) return `<div class="cal-day empty"></div>`;
        const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayTasks = tasksByDay[iso]||[];
        const isToday = iso===todayIso;
        const isSel = iso===selDay;
        return `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" data-day="${iso}"><div>${d}</div><div class="cal-dots">${dayTasks.slice(0,4).map(t=>`<div class="cal-dot" style="background:${PRIORITY_COLOR[t.priority]}"></div>`).join('')}</div></div>`;
      }).join('')}
    </div>
    <div class="cal-daylist">
      ${selDay ? `<div class="section-label">${new Date(selDay+'T00:00:00').toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})}</div>${selTasks.length ? selTasks.map(t=>taskRowHTML(t)).join('') : `<p style="color:var(--ink-faint);font-size:13px;">Nothing due this day.</p>`}` : `<p style="color:var(--ink-faint);font-size:13px;">Tap a day to see what's due.</p>`}
    </div>
  </div>`;
}

/* ============================= EVENTS ============================= */
function attachGlobalEvents(){
  const themeBtn = document.getElementById('btn-theme');
  if(themeBtn) themeBtn.addEventListener('click', ()=>{ state.darkMode=!state.darkMode; persist(); render(); });

  const lockBtn = document.getElementById('btn-lock');
  if(lockBtn) lockBtn.addEventListener('click', ()=>{
    if(!state.pin){ state.pinFlow='setup1'; state.pinDraft=''; render(); }
    else { state.locked=true; state.pinFlow='enter'; state.pinDraft=''; render(); }
  });

  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{ state.view = tab.dataset.view; render(); });
  });

  /* ---- quick add: title input ---- */
  const qaInput = document.getElementById('quickadd-input');
  const qaBox = document.getElementById('quickadd-box');
  const qaSubmit = document.getElementById('quickadd-submit');
  if(qaInput){
    qaInput.focus();
    qaInput.selectionStart = qaInput.selectionEnd = qaInput.value.length;
    qaInput.addEventListener('focus', ()=>qaBox.classList.add('focused'));
    qaInput.addEventListener('blur', ()=>qaBox.classList.remove('focused'));
    qaInput.addEventListener('input', ()=>{ state.draft.title = qaInput.value; updateOverlookOnly(); });
    qaInput.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ doSubmit(); }
    });
  }
  if(qaSubmit) qaSubmit.addEventListener('click', (e)=>{ e.preventDefault(); doSubmit(); });

  function doSubmit(){
    const currentInput = document.getElementById('quickadd-input');
    if(currentInput) state.draft.title = currentInput.value;
    if(!state.draft.title.trim()){ if(currentInput) currentInput.focus(); return; }
    const added = submitDraft();
    if(added){
      showToast('Stamped in: ' + added.title);
      render();
      const fresh = document.getElementById('quickadd-input');
      if(fresh) fresh.focus();
    }
  }

  /* ---- details toggle ---- */
  const detailsToggle = document.getElementById('details-toggle');
  if(detailsToggle) detailsToggle.addEventListener('click', ()=>{ state.detailsOpen = !state.detailsOpen; render(); });

  /* ---- details panel fields ---- */
  const dCategory = document.getElementById('d-category');
  if(dCategory) dCategory.addEventListener('change', ()=>{
    if(dCategory.value==='__new__'){ state.draft.newCategory = true; state.draft.category=''; }
    else { state.draft.newCategory = false; state.draft.category = dCategory.value; }
    render();
  });
  const dNewCategory = document.getElementById('d-new-category');
  if(dNewCategory){ dNewCategory.focus(); dNewCategory.addEventListener('input', ()=>{ state.draft.category = dNewCategory.value; updateOverlookOnly(); }); }

  document.querySelectorAll('#d-priority button').forEach(btn=>{
    btn.addEventListener('click', ()=>{ state.draft.priority = btn.dataset.p; render(); });
  });

  document.querySelectorAll('#d-due-row button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const chip = btn.dataset.due;
      if(chip==='clear'){ state.draft.due=null; state.draft.dueChip=null; }
      else { state.draft.due = computeDueChip(chip); state.draft.dueChip = chip; }
      render();
    });
  });
  const dDueCustom = document.getElementById('d-due-custom');
  if(dDueCustom) dDueCustom.addEventListener('change', ()=>{
    state.draft.due = dDueCustom.value || null;
    state.draft.dueChip = dDueCustom.value ? 'custom' : null;
    render();
  });

  const dRecurrence = document.getElementById('d-recurrence');
  if(dRecurrence) dRecurrence.addEventListener('change', ()=>{ state.draft.recurrence = dRecurrence.value; updateOverlookOnly(); });

  const dTagInput = document.getElementById('d-tag-input');
  if(dTagInput) dTagInput.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' || e.key===','){
      e.preventDefault();
      const val = dTagInput.value.trim().toLowerCase().replace(/^#/,'');
      if(val && !state.draft.tags.includes(val)){ state.draft.tags.push(val); }
      dTagInput.value='';
      render();
      const fresh = document.getElementById('d-tag-input');
      if(fresh) fresh.focus();
    }
  });
  document.querySelectorAll('[data-rm-tag]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ state.draft.tags.splice(parseInt(btn.dataset.rmTag),1); render(); });
  });

  /* ---- task rows ---- */
  document.querySelectorAll('.task-row').forEach(row=>{
    const id = row.dataset.id;
    row.querySelector('[data-action="toggle"]')?.addEventListener('click', ()=>toggleDone(id));
    row.querySelector('[data-action="delete"]')?.addEventListener('click', ()=>deleteTask(id));
  });

  /* ---- board cards ---- */
  document.querySelectorAll('.board-card').forEach(card=>{
    const id = card.dataset.id;
    card.querySelectorAll('[data-move]').forEach(btn=>{ btn.addEventListener('click', ()=>setStatus(id, btn.dataset.move)); });
  });

  /* ---- filters ---- */
  const fSearch = document.getElementById('f-search');
  if(fSearch) fSearch.addEventListener('input', ()=>{ state.filters.search = fSearch.value; renderFilteredOnly(); });
  const fCat = document.getElementById('f-category');
  if(fCat) fCat.addEventListener('change', ()=>{ state.filters.category=fCat.value; render(); });
  const fTag = document.getElementById('f-tag');
  if(fTag) fTag.addEventListener('change', ()=>{ state.filters.tag=fTag.value; render(); });
  const fPri = document.getElementById('f-priority');
  if(fPri) fPri.addEventListener('change', ()=>{ state.filters.priority=fPri.value; render(); });
  const fStatus = document.getElementById('f-status');
  if(fStatus) fStatus.addEventListener('change', ()=>{ state.filters.status=fStatus.value; render(); });
  const fOverdue = document.getElementById('f-overdue');
  if(fOverdue) fOverdue.addEventListener('click', ()=>{ state.filters.overdueOnly=!state.filters.overdueOnly; render(); });

  /* ---- calendar ---- */
  const calPrev = document.getElementById('cal-prev');
  if(calPrev) calPrev.addEventListener('click', ()=>{ state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth()-1, 1); render(); });
  const calNext = document.getElementById('cal-next');
  if(calNext) calNext.addEventListener('click', ()=>{ state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth()+1, 1); render(); });
  document.querySelectorAll('.cal-day[data-day]').forEach(cell=>{
    cell.addEventListener('click', ()=>{ state.selectedDay = cell.dataset.day===state.selectedDay ? null : cell.dataset.day; render(); });
  });
}

function renderFilteredOnly(){
  const main = document.querySelector('main');
  if(main) main.innerHTML = renderView();
  attachGlobalEvents();
  const fSearch = document.getElementById('f-search');
  if(fSearch){ fSearch.focus(); fSearch.setSelectionRange(fSearch.value.length, fSearch.value.length); }
}

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* not hosted with sw.js available — fine, app still works */ });
  });
}

loadState();
